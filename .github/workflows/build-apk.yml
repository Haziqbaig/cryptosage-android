name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk cryptosage-ai.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptosage-ai-apk
          path: cryptosage-ai.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: CryptoSage AI v1.0.${{ github.run_number }}
          files: cryptosage-ai.apk
          body: |
            CryptoSage AI — Phase 1 release APK (auto-built by CI).
            Install on Android 6.0+ (minSdk 23).
